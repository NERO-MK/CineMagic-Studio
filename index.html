<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb', slateBg: '#f8fafc' } } } }</script>
</head>
<body class="antialiased bg-slateBg text-slate-900 overflow-hidden font-sans">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/10 backdrop-blur-sm z-[90] hidden"></div>

    <div class="main-wrapper flex flex-col h-screen w-full overflow-hidden">
        
        <!-- Header: Standard Navigation -->
        <header class="h-16 flex items-center justify-between px-6 border-b border-slate-200 bg-white/80 backdrop-blur-xl z-[100] shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-all">
                    <i class="fa-solid fa-bars-staggered text-lg text-slate-600"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="text-xl">⚡</span>
                    <span class="text-sm font-black tracking-tighter uppercase text-slate-800">CineMagic <span class="text-slate-400 font-normal">/ AI Studio</span></span>
                </div>
            </div>

            <!-- Token Usage HUD (Right) -->
            <div class="flex flex-col text-right">
                <p class="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Total Consumption</p>
                <div class="flex items-center gap-2 justify-end">
                    <span id="tokenTrack" class="text-[12px] font-bold text-slate-800">14,783 Tokens</span>
                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_blue]"></div>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100] overflow-hidden fixed lg:static inset-y-0 left-0">
                <div class="p-8 flex-1 overflow-y-auto custom-scroll text-left">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-6 italic underline">Project Archives</p>
                    <div id="sidebarLibrary" class="space-y-2"></div>
                </div>
                <!-- Profile (Bottom) -->
                <div class="p-8 border-t border-slate-100 bg-slate-50/50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic">A</div>
                        <div class="text-left overflow-hidden"><p class="text-xs font-bold truncate">Alex Thorne</p><p class="text-[9px] font-black text-blue-600 uppercase italic">Lead Producer</p></div>
                    </div>
                </div>
            </aside>

            <!-- Main Production Area -->
            <main class="viewport flex-1 flex flex-col relative overflow-hidden">
                
                <!-- Monitor Section -->
                <div class="monitor-area p-4 md:p-8 shrink-0 bg-white border-b border-slate-100 shadow-sm">
                    <div class="player-wrapper max-w-2xl mx-auto">
                        <div class="player-frame relative group">
                            <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                            <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                            <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                                <div class="w-16 h-16 rounded-full bg-slate-900/90 text-white flex items-center justify-center text-xl backdrop-blur-md shadow-2xl hover:scale-110 transition-all"><i class="fa-solid fa-play ml-1"></i></div>
                            </div>
                        </div>

                        <!-- Precision Action Bar (Standardized Buttons) -->
                        <div class="mt-6 flex justify-between items-center px-1">
                            <h1 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Studio Monitor</h1>
                            <div class="flex items-center gap-3">
                                <button class="action-btn" title="Download"><i class="fa-solid fa-download"></i></button>
                                <div class="h-4 w-[1px] bg-slate-200 mx-1"></div>
                                <button class="action-btn" title="Facebook Sync"><i class="fa-brands fa-facebook-f"></i></button>
                                <button class="action-btn" title="YouTube Sync"><i class="fa-brands fa-youtube"></i></button>
                                <button class="action-btn" title="TikTok Sync"><i class="fa-brands fa-tiktok"></i></button>
                                <button class="action-btn" title="Telegram Delivery"><i class="fa-brands fa-telegram"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10 overflow-y-auto">
                    <div id="chatHistory" class="max-w-2xl mx-auto space-y-12 pb-32">
                        <!-- Initial Message -->
                        <div class="flex gap-6 items-start">
                            <div class="w-10 h-10 rounded-2xl bg-slate-900 flex items-center justify-center text-white text-xs shrink-0 shadow-lg italic">⚡</div>
                            <p class="text-sm leading-relaxed font-medium text-slate-700">Production environment is ready. Architect your vision with CineMagic Intelligence.</p>
                        </div>
                    </div>
                </div>

                <!-- Input Hub: Pill Shaped & Spaced -->
                <div class="shrink-0 p-6 md:p-12 bg-gradient-to-t from-slateBg via-slateBg to-transparent z-40">
                    <div class="max-w-3xl mx-auto">
                        <div class="input-container-pill bg-white border border-slate-200 p-2 flex items-end shadow-2xl focus-within:border-blue-500 transition-all">
                            <button onclick="document.getElementById('mediaUpload').click()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all shrink-0 mb-0.5">
                                <i class="fa-solid fa-circle-plus text-xl"></i>
                            </button>
                            <input type="file" id="mediaUpload" class="hidden" multiple onchange="handleMediaUpload(this)">
                            
                            <textarea id="userInput" rows="1" placeholder="Enter instructions or paste link..." 
                                      class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none overflow-y-auto max-h-[120px] font-medium text-slate-800 leading-relaxed custom-scroll" 
                                      oninput="autoGrow(this)"></textarea>

                            <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 transition-all active:scale-95 disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed">
                                <i id="sendIcon" class="fa-solid fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
