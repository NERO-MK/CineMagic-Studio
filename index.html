<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Master Lead Producer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb', slateBg: '#f8fafc' } } } }</script>
</head>
<body class="antialiased bg-slateBg text-slate-900">
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden lg:hidden"></div>

    <div class="main-wrapper">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100] fixed lg:static inset-y-0 left-0 shadow-xl">
            <div class="p-8 flex-1 overflow-y-auto custom-scroll flex flex-col text-left text-zinc-800">
                <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white font-bold text-xs rounded-2xl mb-12 uppercase tracking-widest shadow-lg">+ New Production</button>
                <div class="space-y-10">
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-5 px-2">Production Archive</p>
                        <div id="sidebarLibrary" class="space-y-2"></div>
                    </div>
                </div>
            </div>
            <!-- HUD -->
            <div class="mt-auto border-t border-slate-100 p-8 space-y-6 bg-slate-50/50">
                <div class="space-y-4 text-left">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-bold uppercase text-slate-500"><span>Daily Quota</span><span class="text-primary">3 / 5</span></div>
                        <div class="hud-bar"><div class="hud-fill" style="width: 60%;"></div></div>
                    </div>
                </div>
                <div onclick="alert('Account Details')" class="flex items-center gap-3 cursor-pointer group">
                    <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic">A</div>
                    <div class="text-left overflow-hidden"><p class="text-xs font-bold truncate">Alex Thorne</p><p class="text-[9px] font-black text-primary uppercase italic">Lead Producer</p></div>
                </div>
            </div>
        </aside>

        <!-- Main Viewport -->
        <main class="viewport">
            <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 shrink-0 bg-white/70 backdrop-blur-xl z-30">
                <div class="flex items-center gap-6">
                    <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:text-primary"><i class="fa-solid fa-bars-staggered text-lg"></i></button>
                    <div class="flex items-center gap-2"><span class="text-2xl">⚡</span><span class="text-sm font-black uppercase text-slate-800">CineMagic <span class="text-slate-400 font-normal">/ Studio</span></span></div>
                </div>
                <span class="text-[9px] font-bold px-3 py-1 bg-primary/10 text-primary rounded-full border border-primary/20 uppercase">Intelligence v6.1</span>
            </header>

            <!-- Monitor Section with Editor Tools -->
            <div class="monitor-area p-4 md:p-6">
                <div class="player-wrapper max-w-3xl mx-auto">
                    <div class="player-frame relative group">
                        <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                        <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                        
                        <!-- Note *: Professional Editor Toolbar Overlay -->
                        <div class="absolute top-4 right-4 flex flex-col gap-2 z-30 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="tool-icon" title="Trim Scene"><i class="fa-solid fa-scissors"></i></button>
                            <button class="tool-icon" title="Add Smart Captions"><i class="fa-solid fa-closed-captioning"></i></button>
                            <button class="tool-icon" title="Audio Mastering"><i class="fa-solid fa-waveform-lines"></i></button>
                            <button class="tool-icon" title="VFX Polish"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                        </div>

                        <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                            <div class="w-16 h-16 rounded-full bg-primary text-white flex items-center justify-center text-xl shadow-2xl transition-transform hover:scale-110"><i class="fa-solid fa-play ml-1"></i></div>
                        </div>
                    </div>
                    <!-- Action Bar -->
                    <div class="mt-4 flex justify-between items-center gap-4 px-2">
                        <h1 id="movieTitle" class="text-xs font-bold uppercase opacity-60 truncate max-w-[200px]">Monitor Standby</h1>
                        <div class="flex gap-1.5">
                            <button class="native-btn"><i class="fa-solid fa-download"></i></button>
                            <button class="native-btn"><i class="fa-solid fa-share-nodes"></i></button>
                            <button class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10">
                <div id="chatHistory" class="max-w-2xl mx-auto space-y-10 pb-48 text-left text-slate-700">
                    <div class="flex gap-6 items-start">
                        <div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center text-primary text-xs shrink-0 border border-primary/20 shadow-sm italic">⚡</div>
                        <div class="space-y-2">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-primary italic text-left">Lead Producer Intelligence</p>
                            <p class="text-sm leading-relaxed font-medium">Hello Alex. I can now perform Deep Ingestion of Novels and Series data. Provide a title or link to begin architecting.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="shrink-0 p-4 md:p-10 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-40">
                <div class="max-w-3xl mx-auto">
                    <div class="input-container bg-white border border-slate-200 p-1.5 flex items-end shadow-2xl focus-within:border-primary/50">
                        <button onclick="document.getElementById('voiceUpload').click()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-primary shrink-0 mb-0.5"><i class="fa-solid fa-microphone text-xl"></i></button>
                        <input type="file" id="voiceUpload" class="hidden" accept="audio/*" onchange="handleVoiceUpload(this)">
                        
                        <textarea id="userInput" rows="1" placeholder="Ask CineMagic or paste a link..." 
                                  class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none overflow-y-auto max-h-[120px] font-medium text-slate-800 leading-relaxed custom-scroll" 
                                  oninput="autoGrow(this)"></textarea>

                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 shadow-lg active:scale-95 transition-all">
                            <i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
