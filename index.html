<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Lead Producer Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { 
            theme: {
                extend: {
                    colors: { primary: '#2563eb', slateBg: '#f8fafc', cardBg: '#ffffff' }
                }
            }
        }
    </script>
</head>
<body class="antialiased bg-slateBg text-slate-900 transition-colors duration-300">

    <!-- Note *: Mobile Sidebar Backdrop -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden lg:hidden"></div>

    <div class="main-wrapper flex flex-row h-screen w-full">
        
        <!-- Sidebar: Library & Identity -->
        <aside id="sidebar" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100] overflow-hidden fixed lg:static inset-y-0 left-0 shadow-xl lg:shadow-none">
            <div class="p-8 flex-1 overflow-y-auto custom-scroll flex flex-col text-left">
                <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white font-bold text-xs rounded-2xl mb-12 uppercase tracking-widest shadow-lg active:scale-95 transition-all">+ New Production</button>
                
                <div class="space-y-10">
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-5 px-2">Production Archive</p>
                        <div id="sidebarLibrary" class="space-y-2">
                            <!-- Archives Load via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar Bottom: Usage & Profile -->
            <div class="mt-auto border-t border-slate-100 p-8 space-y-8 bg-slate-50/50">
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-bold uppercase tracking-wider text-slate-500">
                        <span>Daily Quota</span>
                        <span class="text-primary font-black">3 / 5</span>
                    </div>
                    <div class="hud-bar"><div class="hud-fill" style="width: 60%;"></div></div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3 group overflow-hidden">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic">A</div>
                        <div class="text-left">
                            <p class="text-xs font-bold truncate tracking-tight text-slate-800">Alex Thorne</p>
                            <p class="text-[9px] font-black text-primary uppercase tracking-tighter italic">Lead Producer</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-gear text-slate-300 text-sm"></i>
                </div>
            </div>
        </aside>

        <!-- Main Workspace Viewport -->
        <main class="viewport flex-1 flex flex-col relative overflow-hidden">
            <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 shrink-0 bg-white/70 backdrop-blur-xl z-30">
                <div class="flex items-center gap-6">
                    <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:text-primary transition-all shadow-sm">
                        <i class="fa-solid fa-bars-staggered text-lg"></i>
                    </button>
                    <div class="flex items-center gap-2">
                        <span class="text-2xl text-slate-800">⚡</span>
                        <span class="text-sm font-black tracking-tighter uppercase text-slate-800">CineMagic <span class="text-slate-400 font-normal">/ Studio</span></span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-[9px] font-bold px-3 py-1 bg-primary/10 text-primary rounded-full border border-primary/20 uppercase tracking-widest italic">Core v5.7</span>
                </div>
            </header>

            <!-- Monitor Section -->
            <div class="monitor-area p-4 md:p-8 flex-shrink-0">
                <div class="player-wrapper max-w-4xl mx-auto">
                    <div class="player-frame">
                        <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                        <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                        <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                            <div class="w-16 h-16 rounded-full bg-primary/80 text-white flex items-center justify-center text-xl backdrop-blur-md shadow-2xl transition-transform hover:scale-110">
                                <i class="fa-solid fa-play ml-1"></i>
                            </div>
                        </div>
                    </div>
                    <!-- Pro Actions -->
                    <div class="max-w-[550px] mx-auto mt-6 flex justify-between items-center gap-4 px-2">
                        <div>
                            <h1 id="movieTitle" class="text-sm font-bold tracking-tight uppercase opacity-90">Studio Monitor</h1>
                            <p class="text-[9px] text-primary font-black uppercase tracking-[0.2em] mt-1 italic underline">Ready to Render</p>
                        </div>
                        <div class="flex gap-2">
                            <button class="native-btn"><i class="fa-solid fa-download"></i></button>
                            <button class="native-btn"><i class="fa-solid fa-share-nodes"></i></button>
                            <button class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Scroll Area -->
            <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10">
                <div id="chatHistory" class="max-w-2xl mx-auto space-y-10 pb-48 text-left text-slate-700">
                    <div class="flex gap-6 items-start">
                        <div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center text-primary text-xs italic shrink-0 border border-primary/20 shadow-sm">⚡</div>
                        <div class="space-y-2">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-primary italic">Lead Producer Core</p>
                            <p class="text-sm leading-relaxed font-medium">Hello Alex. Production hub is active. My Specialist Agents are standing by. Command the machine.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Note *: Pill-Shaped Line Input Area -->
            <div class="shrink-0 p-4 md:p-10 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-40">
                <div class="max-w-3xl mx-auto">
                    <div class="input-container bg-white border border-slate-200 p-1.5 flex items-end shadow-2xl transition-all focus-within:border-primary/50">
                        <button onclick="document.getElementById('voiceUpload').click()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-primary transition-all shrink-0 mb-0.5"><i class="fa-solid fa-circle-plus text-xl"></i></button>
                        <input type="file" id="voiceUpload" class="hidden" accept="audio/*">
                        
                        <textarea id="userInput" rows="1" 
                                  placeholder="Describe your movie or paste a link..." 
                                  class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none overflow-y-auto max-h-[120px] font-medium text-slate-800 leading-relaxed custom-scroll" 
                                  oninput="autoGrow(this)"></textarea>
                        
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 shadow-lg active:scale-95 transition-all">
                            <i id="sendIcon" class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                    <p class="text-[8px] text-center mt-4 text-slate-400 font-bold uppercase tracking-[0.4em]">Media Architecture Hub 5.7</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
