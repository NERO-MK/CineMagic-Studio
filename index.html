<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { obsidian: '#050505', zincDark: '#0f0f0f', accent: '#3B82F6' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        html, body { height: 100dvh; overflow: hidden; transition: background-color 0.3s; margin: 0; padding: 0; }
        .main-wrapper { height: 100dvh; display: flex; flex-direction: column; width: 100%; position: relative; }
        
        .dark body { background-color: #050505; color: #e5e5e5; }
        .light body { background-color: #ffffff; color: #171717; }

        /* Monitor: Fixed at Top */
        .monitor-fixed { flex-shrink: 0; z-index: 20; @apply border-b border-zinc-100 dark:border-zinc-800 bg-white/80 dark:bg-obsidian/80 backdrop-blur-md; }
        
        /* Video Container Precision */
        .player-frame { 
            position: relative; 
            aspect-ratio: 16 / 9; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto;
            @apply bg-black rounded-2xl overflow-hidden border border-zinc-200 dark:border-zinc-800 shadow-xl; 
        }

        /* Play Button - Strictly Centered */
        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
        }
        
        /* Chat: Scroll Area */
        .chat-scroll { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { @apply bg-zinc-300 dark:bg-zinc-800 rounded-full; }

        .thinking-pulse { animation: pulseFade 1.5s infinite; }
        @keyframes pulseFade { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .native-btn { @apply flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[10px] font-bold uppercase border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all active:scale-95; }
    </style>
</head>
<body class="antialiased font-sans text-left">

    <div class="main-wrapper">
        
        <!-- Header -->
        <header class="h-14 flex items-center justify-between px-6 border-b border-zinc-100 dark:border-zinc-800 shrink-0 bg-white/80 dark:bg-obsidian/80 backdrop-blur-md z-30">
            <div class="flex items-center gap-2">
                <span class="text-xl">⚡</span>
                <span class="text-xs font-black italic tracking-tighter uppercase text-zinc-800 dark:text-white">CineMagic <span class="text-zinc-400 dark:text-zinc-500 font-normal">/ AI Studio</span></span>
            </div>
            
            <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors shadow-sm">
                <i id="theme-icon" class="fa-solid fa-moon text-xs"></i>
            </button>
        </header>

        <!-- Monitor Section (Fixed at Top) -->
        <div class="monitor-fixed p-4 md:p-6 shadow-sm">
            <div class="player-frame group">
                <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                <!-- Centered Play Button -->
                <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                    <div class="w-14 h-14 rounded-full bg-black/50 border border-white/20 text-white flex items-center justify-center text-xl backdrop-blur-md transition-all hover:scale-110 hover:bg-black/70 shadow-2xl">
                        <i class="fa-solid fa-play ml-1"></i>
                    </div>
                </div>
            </div>
            <!-- Native Browser Style Actions -->
            <div class="max-w-[500px] mx-auto mt-4 flex justify-between items-center gap-4 px-1">
                <h1 class="text-xs font-bold tracking-tight truncate opacity-80 uppercase dark:text-zinc-300 text-zinc-600 italic">Studio Monitor</h1>
                <div class="flex items-center gap-2">
                    <button onclick="alert('Preparing download...')" class="native-btn"><i class="fa-solid fa-download"></i> Download</button>
                    <button onclick="alert('Shared to clipboard')" class="native-btn"><i class="fa-solid fa-share-nodes"></i> Share</button>
                    <button onclick="alert('Social Sync initialized')" class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</button>
                </div>
            </div>
        </div>

        <!-- Chat History (Independently Scrollable) -->
        <div id="workspace" class="chat-scroll p-4 md:p-10 flex flex-col items-center">
            <div id="chatHistory" class="w-full max-w-2xl space-y-6 pb-24 text-zinc-800 dark:text-zinc-100">
                <!-- AI Greeting -->
                <div class="p-7 bg-zinc-50 dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 rounded-[28px] flex gap-5 shadow-sm">
                    <div class="w-10 h-10 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 shrink-0 italic shadow-inner">⚡</div>
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-accent uppercase tracking-widest">Lead Producer</p>
                        <p class="text-sm opacity-80 leading-relaxed font-medium italic">Hello Alex. Production studio is ready. Speak your vision.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Smart Chat Input (Keyboard Responsive) -->
        <div class="shrink-0 p-4 md:p-6 bg-gradient-to-t from-white dark:from-obsidian via-transparent to-transparent z-30">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white dark:bg-zinc-900 rounded-[24px] p-1.5 flex items-end border border-zinc-200 dark:border-zinc-800 focus-within:border-accent shadow-xl transition-all">
                    <button onclick="alert('Upload active')" class="w-11 h-11 flex items-center justify-center text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 transition-colors"><i class="fa-solid fa-circle-plus text-lg"></i></button>
                    <textarea id="userInput" rows="1" placeholder="Describe your movie..." class="flex-1 bg-transparent border-none outline-none text-sm p-3 resize-none max-h-40 text-zinc-800 dark:text-zinc-200 font-medium" oninput="autoGrow(this)"></textarea>
                    <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl flex items-center justify-center hover:opacity-90 active:scale-95 transition-all m-1">
                        <i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i>
                    </button>
                </div>
                <p class="text-[8px] text-center mt-3 text-zinc-400 uppercase tracking-[0.4em] font-bold italic">Global Media Architecture Hub</p>
            </div>
        </div>

    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            html.classList.toggle('dark');
            icon.className = html.classList.contains('dark') ? 'fa-solid fa-moon text-xs' : 'fa-solid fa-sun text-xs';
        }

        function autoGrow(el) { el.style.height = "5px"; el.style.height = (el.scrollHeight) + "px"; }

        // --- CORE CHAT & THINKING LOGIC ---
        async function handleSend() {
            const inputEl = document.getElementById('userInput');
            const input = inputEl.value.trim();
            const sendBtn = document.getElementById('sendBtn');
            const sendIcon = document.getElementById('sendIcon');
            const history = document.getElementById('chatHistory');
            const workspace = document.getElementById('workspace');

            if(!input || sendBtn.disabled) return;

            // 1. User Message
            const userMsg = document.createElement('div');
            userMsg.className = "flex justify-end animate-in fade-in slide-in-from-bottom-2 mb-4";
            userMsg.innerHTML = `<div class="bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 p-4 rounded-[18px] text-sm max-w-[85%] shadow-md font-medium">${input}</div>`;
            history.appendChild(userMsg);

            // UI Prep
            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;
            sendIcon.className = "fa-solid fa-spinner fa-spin text-lg";

            // 2. Thinking Bubble
            const thinkingMsg = document.createElement('div');
            thinkingMsg.className = "p-7 bg-zinc-50 dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 rounded-[28px] flex gap-5 shadow-sm mb-4";
            thinkingMsg.innerHTML = `
                <div class="w-10 h-10 rounded-lg bg-accent/10 flex items-center justify-center text-accent text-[10px] italic shrink-0">⚡</div>
                <div class="flex items-center gap-3">
                    <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest thinking-pulse italic">Thinking...</span>
                    <span class="flex gap-1">
                        <span class="w-1 h-1 bg-accent rounded-full animate-bounce"></span>
                        <span class="w-1 h-1 bg-accent rounded-full animate-bounce [animation-delay:0.2s]"></span>
                        <span class="w-1 h-1 bg-accent rounded-full animate-bounce [animation-delay:0.4s]"></span>
                    </span>
                </div>`;
            history.appendChild(thinkingMsg);
            workspace.scrollTop = workspace.scrollHeight;

            try {
                // Fetch from Railway Backend
                const response = await fetch('https://cinemagic-engine-production.up.railway.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'message': input })
                });
                const data = await response.json();
                
                // Replace Thinking with Result
                thinkingMsg.innerHTML = `
                    <div class="w-10 h-10 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 shrink-0 italic shadow-inner">⚡</div>
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-accent uppercase tracking-widest text-left">Lead Producer</p>
                        <p class="text-sm opacity-80 leading-relaxed font-medium text-left">${data.reply.replace(/\n/g, '<br>')}</p>
                    </div>`;
            } catch (e) {
                thinkingMsg.innerHTML = `<p class="text-xs text-red-500 p-2 italic text-left text-center">Engine Connection Offline.</p>`;
            } finally {
                sendBtn.disabled = false;
                sendIcon.className = "fa-solid fa-arrow-up text-lg";
                workspace.scrollTop = workspace.scrollHeight;
            }
        }

        function startVideo() {
            const video = document.getElementById('videoPlayer');
            video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
            document.getElementById('poster').classList.add('hidden');
            document.getElementById('playBtn').classList.add('hidden');
            video.classList.remove('hidden');
            video.play();
        }
    </script>
</body>
</html>
