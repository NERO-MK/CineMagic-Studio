<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Lead Producer Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb', slateBg: '#f8fafc' } } } }</script>
</head>
<body class="antialiased bg-slateBg text-slate-900">

    <div id="sidebarOverlay" onclick="closeSidebars()" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden"></div>

    <div class="main-wrapper flex flex-row h-screen w-full">
        
        <!-- Left Sidebar: Library & Identity -->
        <aside id="sidebarLeft" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100]">
            <div class="p-6 flex-1 overflow-y-auto custom-scroll text-left">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-5 px-2 italic">Archives</p>
                <div id="sidebarLibrary" class="space-y-2"></div>
            </div>
            <div class="p-8 border-t border-slate-100 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic">A</div>
                <div class="text-left"><p class="text-xs font-bold">Alex Thorne</p><p class="text-[9px] font-black text-primary uppercase">Lead Producer</p></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="viewport flex-1 flex flex-col relative overflow-hidden">
            <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 bg-white/70 backdrop-blur-xl z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar('left')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:text-primary"><i class="fa-solid fa-bars-staggered text-lg"></i></button>
                    <div class="flex items-center gap-2"><span class="text-2xl">⚡</span><span class="text-sm font-black uppercase">CineMagic <span class="text-slate-400 font-normal">/ Studio</span></span></div>
                </div>
                <button onclick="toggleSidebar('right')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200"><i class="fa-solid fa-wand-magic-sparkles text-lg"></i></button>
            </header>

            <!-- Monitor Section -->
            <div class="monitor-area p-4 md:p-6 flex-shrink-0">
                <div class="player-wrapper max-w-2xl mx-auto">
                    <div class="player-frame">
                        <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                        <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                        <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                            <div class="w-14 h-14 rounded-full bg-primary/80 text-white flex items-center justify-center text-xl backdrop-blur-md shadow-2xl transition-transform hover:scale-110"><i class="fa-solid fa-play ml-1"></i></div>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-between items-center gap-4 px-2">
                        <h1 id="movieTitle" class="text-xs font-bold uppercase opacity-60">Monitor Standby</h1>
                        <div class="flex gap-2">
                            <button class="native-btn"><i class="fa-solid fa-download"></i></button>
                            <button class="native-btn"><i class="fa-solid fa-share-nodes"></i></button>
                            <button class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10">
                <div id="chatHistory" class="max-w-2xl mx-auto space-y-10 pb-48 text-left">
                    <!-- Chats will append here -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="shrink-0 p-4 md:p-8 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-40">
                <div class="max-w-2xl mx-auto">
                    <div class="input-container bg-white border border-slate-200 p-1.5 flex items-end shadow-2xl focus-within:border-primary/50">
                        <button onclick="document.getElementById('voiceUpload').click()" class="w-11 h-11 flex items-center justify-center text-slate-400 hover:text-primary"><i class="fa-solid fa-microphone text-lg"></i></button>
                        <input type="file" id="voiceUpload" class="hidden" accept="audio/*">
                        <textarea id="userInput" rows="1" placeholder="Describe or paste link..." class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none max-h-[120px] font-medium" oninput="autoGrow(this)"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 active:scale-95"><i id="sendIcon" class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar: Pro Automation Tools -->
        <aside id="sidebarRight" class="sidebar-closed bg-white border-l border-slate-200 flex flex-col h-full z-[100] p-6 overflow-y-auto custom-scroll">
            <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-8 italic">Pro Automation</h3>
            
            <div class="space-y-6">
                <!-- Preset 1: Content Type -->
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Production Mode</label>
                    <select id="presetMode" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none focus:border-primary">
                        <option value="recap_voice">Recap with AI Voice</option>
                        <option value="recap_sub">Recap with Subtitles Only</option>
                        <option value="full_sub">Full Movie Subtitles</option>
                        <option value="short_movie">Short Movie Highlight</option>
                        <option value="ads">Marketing Ads Logic</option>
                    </select>
                </div>

                <!-- Preset 2: Duration -->
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Target Duration</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setDuration('3')" class="p-2 border border-slate-100 rounded-lg text-[10px] font-bold hover:bg-primary hover:text-white transition">3 MINS</button>
                        <button onclick="setDuration('5')" class="p-2 border border-slate-100 rounded-lg text-[10px] font-bold hover:bg-primary hover:text-white transition">5 MINS</button>
                        <button onclick="setDuration('7')" class="p-2 border border-slate-100 rounded-lg text-[10px] font-bold hover:bg-primary hover:text-white transition">7 MINS</button>
                        <button onclick="setDuration('15')" class="p-2 border border-slate-100 rounded-lg text-[10px] font-bold hover:bg-primary hover:text-white transition">15 MINS</button>
                    </div>
                </div>

                <!-- One-Click Master Button -->
                <div class="pt-10">
                    <button onclick="autoProduce()" class="w-full py-4 bg-blue-600 text-white font-black text-[11px] rounded-2xl shadow-xl shadow-blue-200 uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">
                        🚀 Start Auto-Production
                    </button>
                    <p class="text-[8px] text-center mt-4 text-slate-400 font-medium">AI will architect the full masterpiece with one click.</p>
                </div>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
