<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Master Global Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb', slateBg: '#f8fafc' } } } }</script>
</head>
<body class="antialiased bg-slateBg text-slate-900 overflow-hidden">
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden lg:hidden"></div>

    <!-- Note *: Account & Unified Sync Hub -->
    <div id="settingsModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh] custom-scroll">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold uppercase tracking-tighter italic">Studio Hub</h2>
                <button onclick="toggleSettings()" class="text-zinc-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="space-y-8">
                <div class="flex items-center gap-5 p-6 bg-slate-50 rounded-3xl border border-slate-100">
                    <div class="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-lg text-xl italic shrink-0">A</div>
                    <div class="text-left overflow-hidden"><p class="text-lg font-bold truncate">Alex Thorne</p><p class="text-[9px] font-black text-primary uppercase italic">Technical Director</p></div>
                </div>
                <!-- Unified Social Sync Hub -->
                <div class="space-y-4">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2 text-left">Platform Connections</p>
                    <div class="grid grid-cols-1 gap-3">
                        <div class="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                            <div class="flex items-center gap-3"><i class="fa-brands fa-tiktok text-black"></i><span class="text-xs font-bold">TikTok Pro</span></div>
                            <button class="px-3 py-1 bg-zinc-900 text-white text-[9px] font-bold rounded-full uppercase">Connect</button>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                            <div class="flex items-center gap-3"><i class="fa-brands fa-youtube text-red-600"></i><span class="text-xs font-bold">YouTube Master</span></div>
                            <span class="text-[8px] font-bold text-green-600 bg-green-100 px-2 py-1 rounded-full uppercase">Connected</span>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full py-5 text-sm font-bold text-red-500 bg-red-500/5 rounded-3xl">Sign Out Master Session</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper flex flex-row h-screen w-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100] fixed lg:static inset-y-0 left-0 shadow-2xl lg:shadow-none overflow-hidden">
            <div class="p-8 flex-1 overflow-y-auto custom-scroll flex flex-col text-left">
                <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white font-bold text-xs rounded-2xl mb-12 uppercase tracking-widest shadow-xl">+ New Production</button>
                <nav class="space-y-10">
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-5 px-2 underline">Archives</p>
                        <div id="sidebarLibrary" class="space-y-2"></div>
                    </div>
                </nav>
            </div>
            <!-- HUD -->
            <div class="mt-auto border-t border-slate-100 p-8 space-y-8 bg-slate-50/50">
                <div class="space-y-4 text-left">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-bold uppercase text-slate-500"><span>Daily Limit</span><span class="text-primary">3/5</span></div>
                        <div class="hud-bar"><div class="hud-fill" style="width: 60%;"></div></div>
                    </div>
                </div>
                <div onclick="toggleSettings()" class="flex items-center justify-between gap-3 cursor-pointer group flex-1 overflow-hidden">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic shrink-0">A</div>
                        <div class="text-left overflow-hidden"><p class="text-xs font-bold truncate">Alex Thorne</p><p class="text-[9px] font-black text-primary uppercase">Lead Producer</p></div>
                    </div>
                    <i class="fa-solid fa-gear text-slate-300"></i>
                </div>
            </div>
        </aside>

        <!-- Viewport -->
        <main class="viewport">
            <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 shrink-0 bg-white/70 backdrop-blur-xl z-30">
                <div class="flex items-center gap-6">
                    <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:text-primary"><i class="fa-solid fa-bars-staggered text-lg"></i></button>
                    <div class="flex items-center gap-2"><span class="text-2xl">⚡</span><span class="text-sm font-black uppercase">CineMagic <span class="text-slate-400 font-normal">/ Studio</span></span></div>
                </div>
                <span class="text-[9px] font-bold px-3 py-1 bg-primary/10 text-primary rounded-full border border-primary/20 uppercase tracking-widest italic">Masterpiece v12.0</span>
            </header>

            <!-- Sticky Monitor -->
            <div class="monitor-area p-4 md:p-8 shrink-0 border-b border-slate-100 bg-white">
                <div class="player-wrapper max-w-4xl mx-auto flex flex-col gap-6">
                    <div class="player-frame relative group">
                        <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                        <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                        
                        <!-- VFX & Semantic Controls -->
                        <div class="absolute top-4 right-4 flex flex-col gap-2 z-30 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="tool-btn-v12" title="AI Lip-Sync"><i class="fa-solid fa-lips"></i></button>
                            <button class="tool-btn-v12" title="Semantic Scene Search"><i class="fa-solid fa-magnifying-glass"></i></button>
                            <button class="tool-btn-v12" title="Copyright Guard"><i class="fa-solid fa-shield-check"></i></button>
                        </div>

                        <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                            <div class="w-16 h-16 rounded-full bg-primary/80 text-white flex items-center justify-center text-xl backdrop-blur-md shadow-2xl transition-transform hover:scale-110"><i class="fa-solid fa-play ml-1"></i></div>
                        </div>
                    </div>
                    <!-- Pro Action Bar with Dropdown -->
                    <div class="max-w-[550px] mx-auto w-full flex justify-between items-center gap-4 px-2">
                        <h1 id="movieTitle" class="text-xs font-bold uppercase opacity-60 italic">Monitor Standby</h1>
                        <div class="relative inline-block text-left" id="actionContainer">
                            <button onclick="toggleActionMenu()" class="flex items-center gap-2 px-5 py-2 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl hover:scale-105 transition-all">
                                <i class="fa-solid fa-cloud-arrow-up"></i> Export Masterpiece <i class="fa-solid fa-chevron-down text-[8px]"></i>
                            </button>
                            <div id="actionMenu" class="hidden absolute right-0 mt-3 w-52 bg-white border border-slate-200 rounded-[2rem] shadow-2xl z-[110] overflow-hidden">
                                <button class="dropdown-item"><i class="fa-solid fa-download w-4"></i> Local Download</button>
                                <button class="dropdown-item text-blue-600"><i class="fa-brands fa-telegram w-4"></i> Send to My Telegram</button>
                                <div class="border-t border-slate-100 my-1"></div>
                                <button class="dropdown-item"><i class="fa-brands fa-tiktok w-4"></i> Direct TikTok Post</button>
                                <button class="dropdown-item"><i class="fa-brands fa-youtube w-4 text-red-600"></i> Direct YouTube Post</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10">
                <div id="chatHistory" class="max-w-2xl mx-auto space-y-10 pb-48 text-left text-slate-700">
                    <!-- Chats -->
                </div>
            </div>

            <div class="shrink-0 p-4 md:p-10 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-40">
                <div class="max-w-3xl mx-auto">
                    <div class="input-container bg-white border border-slate-200 p-1.5 flex items-end shadow-2xl focus-within:border-primary/50 transition-all">
                        <button onclick="document.getElementById('voiceUpload').click()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-primary shrink-0 mb-0.5 transition-all"><i class="fa-solid fa-microphone text-xl"></i></button>
                        <input type="file" id="voiceUpload" class="hidden" accept="audio/*" onchange="handleVoiceUpload(this)">
                        <textarea id="userInput" rows="1" placeholder="Describe vision or paste link..." class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none overflow-y-auto max-h-[120px] font-medium text-slate-800 leading-relaxed custom-scroll" oninput="autoGrow(this)"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 shadow-lg active:scale-95 transition-all"><i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i></button>
                    </div>
                    <p class="text-[8px] text-center mt-4 text-slate-400 font-bold uppercase tracking-[0.4em]">Global Media Ecosystem // v12.0</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
