<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Elite AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="antialiased transition-colors duration-300">
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[90] hidden"></div>

    <div class="main-wrapper">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-closed">
            <div class="p-6 flex-1 overflow-y-auto custom-scroll">
                <button onclick="location.reload()" class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 font-bold text-[10px] rounded-lg mb-8 uppercase tracking-widest shadow-md">+ New Project</button>
                <nav class="space-y-8 text-left">
                    <div>
                        <p class="text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest mb-4 px-2 italic underline">Archives</p>
                        <!-- Note *: Archives Repair -->
                        <div id="sidebarLibrary" class="space-y-1">
                            <p class="text-[10px] text-zinc-400 p-2 italic">Syncing archive...</p>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="mt-auto p-6 border-t border-zinc-100 dark:border-zinc-800 bg-zinc-50/30 dark:bg-transparent text-left">
                <div onclick="toggleSettings()" class="flex items-center gap-3 cursor-pointer group">
                    <div class="w-9 h-9 rounded-lg bg-zinc-900 dark:bg-zinc-100 flex items-center justify-center font-bold text-white dark:text-zinc-900 shadow-md text-xs italic">A</div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-[10px] font-black uppercase truncate dark:text-zinc-200 text-zinc-800">Alex Thorne</p>
                        <p class="text-[8px] font-bold text-accent uppercase tracking-widest italic">Free Tier</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="viewport">
            <header class="h-14 flex items-center justify-between px-6 border-b border-zinc-100 dark:border-zinc-800 shrink-0 bg-white/80 dark:bg-obsidian/80 backdrop-blur-md z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="text-zinc-500 p-1 hover:text-accent transition-colors"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
                    <div class="flex items-center gap-2">
                        <span class="text-xl">⚡</span>
                        <span class="text-xs font-black italic tracking-tighter uppercase text-zinc-800 dark:text-white">CineMagic <span class="text-zinc-400 dark:text-zinc-500 font-normal">/ AI Studio</span></span>
                    </div>
                </div>
                <!-- Note *: Theme Change Fix -->
                <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors shadow-sm">
                    <i id="theme-icon" class="fa-solid fa-moon text-xs"></i>
                </button>
            </header>

            <div class="monitor-fixed p-4 md:p-6 shadow-sm">
                <div class="player-frame">
                    <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                    <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                    <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                        <div class="w-14 h-14 rounded-full bg-black/50 border border-white/20 text-white flex items-center justify-center text-xl backdrop-blur-md hover:scale-110 shadow-2xl transition-transform">
                            <i class="fa-solid fa-play ml-1"></i>
                        </div>
                    </div>
                </div>
                <div class="max-w-[500px] mx-auto mt-4 flex justify-between items-center gap-4 px-1 text-left">
                    <h1 id="movieTitle" class="text-xs font-bold truncate opacity-80 uppercase dark:text-zinc-300 text-zinc-600">Monitor Standby</h1>
                    <div class="flex gap-2">
                        <button onclick="alert('Preparing download...')" class="native-btn"><i class="fa-solid fa-download"></i></button>
                        <button onclick="alert('Shared')" class="native-btn"><i class="fa-solid fa-share-nodes"></i></button>
                        <button onclick="alert('Cloud Sync initialized')" class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                    </div>
                </div>
            </div>

            <div id="workspace" class="chat-scroll p-4 md:p-10 flex flex-col items-center">
                <div id="chatHistory" class="w-full max-w-2xl space-y-6 pb-48 text-left">
                    <div class="p-7 bg-zinc-50 dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 rounded-[28px] flex gap-5 shadow-sm">
                        <div class="w-10 h-10 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 shrink-0 italic shadow-inner">⚡</div>
                        <p class="text-sm opacity-80 leading-relaxed font-medium text-zinc-800 dark:text-zinc-100">Welcome, Alex. Production studio is active. Speak your vision.</p>
                    </div>
                </div>
            </div>

            <div class="shrink-0 p-4 md:p-6 bg-gradient-to-t from-white dark:from-obsidian via-transparent to-transparent z-30">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white dark:bg-zinc-900 rounded-[24px] p-1.5 flex items-end border border-zinc-200 dark:border-zinc-800 focus-within:border-accent shadow-xl transition-all">
                        <button onclick="alert('Module loading...')" class="w-11 h-11 flex items-center justify-center text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 transition-colors"><i class="fa-solid fa-circle-plus text-lg"></i></button>
                        <textarea id="userInput" rows="1" placeholder="Ask CineMagic..." class="flex-1 bg-transparent border-none outline-none text-sm p-3 resize-none max-h-40 font-medium text-zinc-800 dark:text-zinc-200" oninput="autoGrow(this)"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl flex items-center justify-center hover:opacity-90 active:scale-95 transition-all m-1">
                            <i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
