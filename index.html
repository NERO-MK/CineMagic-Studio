<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMagic | Professional AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { accent: '#38bdf8' }, fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { @apply bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-slate-100 transition-colors duration-300; }
        .glass-sidebar { @apply bg-white/95 dark:bg-zinc-950/95 backdrop-blur-3xl border-r border-black/5 dark:border-white/5; }
        .menu-item { @apply flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 dark:text-slate-400 hover:bg-sky-500/10 hover:text-sky-500 transition-all cursor-pointer; }
        .menu-item.active { @apply bg-sky-500/10 text-sky-500 border border-sky-500/20; }
        .history-card { @apply flex flex-col gap-1 p-3 rounded-xl border border-transparent hover:border-sky-500/20 hover:bg-sky-500/5 transition-all cursor-pointer group; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        
        /* Mobile Slide Logic */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Mobile Overlay (Backdrop) -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden"></div>

    <!-- Sidebar (Responsive Slide-over) -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 glass-sidebar flex flex-col h-full z-50 -translate-x-full lg:translate-x-0 overflow-hidden">
        
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl filter drop-shadow-[0_0_10px_rgba(56,189,248,0.5)]">⚡</span>
                <span class="text-2xl font-extrabold tracking-tighter uppercase">CineMagic</span>
            </div>
            <!-- Close button for mobile -->
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-500"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-8">
            <div>
                <p class="px-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-3">Studio Menu</p>
                <nav class="space-y-1">
                    <div class="menu-item active"><i class="fa-solid fa-wand-sparkles w-5"></i> Workspace</div>
                    <div class="menu-item"><i class="fa-solid fa-chart-line w-5"></i> Trend Pulse</div>
                    <div class="menu-item"><i class="fa-solid fa-microphone-lines w-5"></i> Voice Lab</div>
                </nav>
            </div>

            <div class="px-4">
                <button onclick="window.location.reload()" class="w-full bg-accent hover:bg-sky-400 text-white font-extrabold py-3 rounded-2xl shadow-lg shadow-sky-500/30 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus-circle"></i> NEW CAMPAIGN
                </button>
            </div>

            <div>
                <p class="px-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-3">Library</p>
                <div class="space-y-2 px-1">
                    <div class="history-card group">
                        <span class="text-[9px] font-bold text-accent bg-accent/10 px-2 rounded italic w-max">Marketing</span>
                        <p class="text-xs font-bold truncate">Global Ad 2024</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-6 border-t dark:border-white/5 bg-slate-50/50 dark:bg-white/[0.02]">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-white font-black text-xs">LD</div>
                    <p class="text-[10px] font-black uppercase tracking-widest leading-none">LEAD DEV</p>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-sky-500/10 transition">
                    <i class="fa-solid fa-circle-half-stroke text-slate-400"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative overflow-hidden w-full">
        
        <!-- Header with Hamburger Menu -->
        <header class="h-16 lg:h-20 flex items-center justify-between px-6 lg:px-10 border-b dark:border-white/5">
            <div class="flex items-center gap-4">
                <!-- Mobile Menu Button -->
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-white/5 rounded-xl text-slate-500">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <div class="flex flex-col lg:flex-row lg:items-center lg:gap-3">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Workspace</span>
                    <span class="hidden lg:inline text-slate-500">/</span>
                    <span class="text-[10px] font-black text-accent uppercase tracking-widest">Production Suite</span>
                </div>
            </div>
            <div class="hidden sm:flex items-center gap-4">
                <span class="text-[9px] font-bold px-3 py-1 bg-green-500/10 text-green-500 rounded-full border border-green-500/20 uppercase tracking-tighter">
                    Hybrid Active
                </span>
            </div>
        </header>

        <!-- Main Production Area -->
        <section class="flex-1 overflow-y-auto p-6 lg:p-10 flex flex-col items-center">
            <div id="welcomeState" class="mt-10 lg:mt-20 text-center max-w-2xl">
                <span class="text-accent text-5xl lg:text-6xl mb-4 lg:mb-6 inline-block filter drop-shadow-2xl">⚡</span>
                <h1 class="text-4xl lg:text-6xl font-black mb-4 lg:mb-6 tracking-tighter italic">CineMagic</h1>
                <p class="text-slate-500 dark:text-slate-400 text-xs lg:text-sm leading-relaxed font-medium px-4">
                    The World's Best AI Production Studio. Zero-Data Cloud Posting technology.
                </p>
            </div>
            <div id="productionBoard" class="hidden w-full max-w-5xl space-y-8">
                <!-- Results cards go here -->
            </div>
        </section>

        <!-- Omni-Box Hub (Global Prompting) -->
        <footer class="p-4 lg:p-10 z-30">
            <div class="max-w-4xl mx-auto dark:bg-zinc-900/90 bg-white shadow-2xl rounded-2xl lg:rounded-[32px] p-2 flex items-center border dark:border-white/10 border-black/5">
                <button class="w-10 h-10 lg:w-14 lg:h-14 flex items-center justify-center text-slate-400 hover:text-accent transition">
                    <i class="fa-solid fa-plus-circle text-lg lg:text-xl"></i>
                </button>
                <textarea id="omniInput" rows="1" placeholder="Paste link or prompt..." class="flex-1 bg-transparent border-none outline-none text-xs lg:text-sm px-2 lg:px-4 py-3 lg:py-4 resize-none font-medium text-slate-700 dark:text-slate-200"></textarea>
                <button onclick="processInput()" class="w-10 h-10 lg:w-14 lg:h-14 bg-accent text-white rounded-xl lg:rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/40 hover:scale-105 transition-all">
                    <i class="fa-solid fa-arrow-up text-lg"></i>
                </button>
            </div>
            <p class="text-center mt-3 lg:mt-4 text-[8px] lg:text-[9px] uppercase tracking-[0.4em] text-slate-500 font-bold">
                Elite AI Linguistic System
            </p>
        </footer>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        function processInput() {
            const input = document.getElementById('omniInput').value;
            if (input) {
                document.getElementById('welcomeState').classList.add('hidden');
                document.getElementById('productionBoard').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
