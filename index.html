<!-- Note *: Full Replace for index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Production Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb', slateBg: '#f8fafc' } } } }</script>
</head>
<body class="antialiased bg-slateBg text-slate-900 overflow-hidden font-sans">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/10 backdrop-blur-sm z-[90] hidden"></div>

    <div class="main-wrapper flex flex-col h-screen w-full overflow-hidden">
        
        <header class="h-16 flex items-center justify-between px-6 border-b border-slate-200 bg-white/80 backdrop-blur-xl z-[100] shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 border border-slate-100 text-slate-600">
                    <i class="fa-solid fa-bars-staggered text-lg"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="text-2xl">⚡</span>
                    <span class="text-sm font-black tracking-tighter uppercase text-slate-800">CineMagic <span class="text-slate-400 font-normal">/ Studio</span></span>
                </div>
            </div>
            <div class="flex flex-col text-right">
                <p class="text-[8px] font-black uppercase text-slate-400 tracking-[0.2em] leading-none mb-1">Active Intelligence</p>
                <div class="flex items-center gap-2 justify-end">
                    <span id="modelDisplay" class="text-[11px] font-bold text-slate-800 tracking-tight italic">Groq Llama 3</span>
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside id="sidebar" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100] overflow-hidden fixed lg:static inset-y-0 left-0 shadow-2xl lg:shadow-none">
                <div class="p-8 flex-1 overflow-y-auto custom-scroll text-left">
                    <button onclick="location.reload()" class="w-full py-3 bg-zinc-900 text-white font-bold text-[10px] rounded-lg mb-8 uppercase tracking-widest shadow-md">+ New Production</button>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6 italic underline">Archives</p>
                    <div id="sidebarLibrary" class="space-y-1"></div>
                </div>
                <div class="p-8 border-t border-slate-100 bg-slate-50/50">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic text-xs">A</div>
                        <p class="text-[11px] font-bold truncate">Alex Thorne</p>
                    </div>
                </div>
            </aside>

            <main class="viewport flex-1 flex flex-col relative overflow-hidden">
                
                <div class="monitor-area p-4 md:p-8 shrink-0 bg-white border-b border-slate-100 shadow-sm z-30">
                    <div class="player-wrapper max-w-2xl mx-auto">
                        <div class="player-frame relative group">
                            <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                            <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                            <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                                <div class="w-14 h-14 rounded-full bg-slate-900/80 text-white flex items-center justify-center text-xl backdrop-blur-md shadow-2xl transition-transform hover:scale-110">
                                    <i class="fa-solid fa-play ml-1"></i>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-between items-center px-1">
                            <h1 class="text-[10px] font-bold uppercase text-slate-400 tracking-widest italic">Monitor Active</h1>
                            <div class="flex items-center gap-4"> 
                                <button class="native-action-item"><i class="fa-solid fa-download"></i></button>
                                <button class="native-action-item"><i class="fa-brands fa-facebook-f"></i></button>
                                <button class="native-action-item"><i class="fa-brands fa-youtube"></i></button>
                                <button class="native-action-item"><i class="fa-brands fa-tiktok"></i></button>
                                <button class="native-action-item"><i class="fa-brands fa-telegram"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10 overflow-y-auto">
                    <div id="chatHistory" class="max-w-2xl mx-auto space-y-12 pb-48">
                        <div class="flex gap-6 items-start">
                            <div class="w-8 h-8 rounded bg-zinc-200 flex items-center justify-center text-[10px] font-bold text-zinc-500 shrink-0 italic">⚡</div>
                            <p class="text-sm opacity-80 leading-relaxed font-medium text-slate-800">Hello Alex Thorne. Your cinematic studio is ready. Speak your vision.</p>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="shrink-0 p-4 md:p-10 bg-gradient-to-t from-slateBg via-slateBg to-transparent z-40">
                    <div class="max-w-3xl mx-auto px-2">
                        <!-- Hidden File Input -->
                        <input type="file" id="fileInput" class="hidden" onchange="handleFileChange(this)">
                        
                        <div class="pill-input-container bg-white border border-slate-200 p-1.5 flex items-end shadow-2xl focus-within:border-primary/50 transition-all">
                            <!-- Note *: Enabled Upload Button -->
                            <button onclick="document.getElementById('fileInput').click()" id="uploadBtn" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all shrink-0 mb-0.5">
                                <i class="fa-solid fa-circle-plus text-xl"></i>
                            </button>
                            
                            <textarea id="userInput" rows="1" placeholder="Describe your vision..." 
                                      class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none overflow-y-auto max-h-[120px] font-medium text-slate-800 leading-relaxed" 
                                      oninput="autoGrow(this)"></textarea>

                            <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 shadow-lg active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed">
                                <i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
