<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Master Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        html, body { height: 100dvh; overflow: hidden; margin: 0; background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .main-layout { height: 100dvh; display: flex; width: 100%; position: relative; }
        
        /* Sidebar Fix */
        #sidebar { 
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px; z-index: 100;
            transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column;
        }
        #sidebar.sidebar-open { transform: translateX(0); }

        /* Monitor Fixed */
        .monitor-fixed { flex-shrink: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-blur-md; border-bottom: 1px solid #e2e8f0; }
        .player-frame { position: relative; aspect-ratio: 16/9; width: 100%; max-width: 500px; margin: 0 auto; background: #000; border-radius: 1.5rem; overflow: hidden; }
        .video-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; }

        .chat-scroll { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .hud-bar { height: 4px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .hud-fill { height: 100%; background: #2563eb; transition: width 0.5s; }
        .native-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; }
    </style>
</head>
<body class="antialiased">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 z-[90] hidden"></div>

    <div class="main-layout text-left">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="p-6 flex-1 overflow-y-auto chat-scroll">
                <button onclick="location.reload()" class="w-full py-3 bg-zinc-900 text-white font-bold text-[10px] rounded-xl mb-8 uppercase tracking-widest shadow-lg">+ New Project</button>
                <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-4 px-2 italic underline text-left">Archives</p>
                <div id="sidebarLibrary" class="space-y-1">
                    <!-- Loaded via JS -->
                </div>
            </div>
            <!-- HUD & Profile at Bottom -->
            <div class="mt-auto border-t border-slate-100 p-8 space-y-6 bg-slate-50/50">
                <div class="space-y-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-bold uppercase text-slate-500"><span>Daily Limit</span><span class="text-blue-600">3/5</span></div>
                        <div class="hud-bar"><div class="hud-fill" style="width: 60%;"></div></div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic">A</div>
                    <div class="text-left overflow-hidden"><p class="text-xs font-bold truncate">Alex Thorne</p><p class="text-[9px] font-black text-blue-600 uppercase italic">Lead Producer</p></div>
                </div>
            </div>
        </aside>

        <!-- Main Viewport -->
        <main class="flex flex-col flex-1 min-width-0 h-full relative overflow-hidden bg-slate-50">
            <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 bg-white/70 backdrop-blur-md z-[80]">
                <div class="flex items-center gap-4 text-left">
                    <button onclick="toggleSidebar()" class="text-slate-500 p-1 hover:text-blue-600"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
                    <div class="flex items-center gap-2">
                        <span class="text-xl">⚡</span>
                        <span class="text-xs font-black italic tracking-tighter uppercase text-slate-800">CineMagic <span class="text-slate-400 font-normal">/ AI Studio</span></span>
                    </div>
                </div>
            </header>

            <div class="monitor-fixed p-4 md:p-6 shadow-sm">
                <div class="player-frame">
                    <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                    <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                    <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                        <div class="w-14 h-14 rounded-full bg-black/50 border border-white/20 text-white flex items-center justify-center text-xl backdrop-blur-md hover:scale-110 shadow-2xl transition-transform"><i class="fa-solid fa-play ml-1"></i></div>
                    </div>
                </div>
                <div class="max-w-[500px] mx-auto mt-4 flex justify-between items-center gap-4 px-1">
                    <h1 id="movieTitle" class="text-xs font-bold truncate opacity-80 uppercase">Monitor Standby</h1>
                    <div class="flex gap-2">
                        <button class="native-btn"><i class="fa-solid fa-download"></i></button>
                        <button class="native-btn"><i class="fa-solid fa-share-nodes"></i></button>
                        <button class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                    </div>
                </div>
            </div>

            <div id="workspace" class="chat-scroll p-4 md:p-10 flex flex-col items-center">
                <div id="chatHistory" class="w-full max-w-2xl space-y-8 pb-48 text-left">
                    <div class="p-7 bg-white border border-slate-200 rounded-[28px] flex gap-5 shadow-sm">
                        <div class="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center text-[10px] font-bold text-blue-600 shrink-0 italic">⚡</div>
                        <p class="text-sm opacity-80 leading-relaxed font-medium">Hello Alex. Production studio is ready. Speak your vision.</p>
                    </div>
                </div>
            </div>

            <div class="shrink-0 p-4 md:p-6 bg-gradient-to-t from-white via-transparent to-transparent z-30">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white rounded-[24px] p-1.5 flex items-end border border-slate-200 focus-within:border-blue-500 shadow-xl">
                        <button class="w-11 h-11 flex items-center justify-center text-slate-400"><i class="fa-solid fa-circle-plus text-lg"></i></button>
                        <textarea id="userInput" rows="1" placeholder="Ask CineMagic..." class="flex-1 bg-transparent border-none outline-none text-sm p-3 resize-none max-h-40 font-medium" oninput="autoGrow(this)"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-xl flex items-center justify-center m-1 shrink-0"><i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentProjectId = null;
        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sb.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }
        function autoGrow(el) { el.style.height = "5px"; el.style.height = (el.scrollHeight) + "px"; }

        async function loadSidebar() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                const container = document.getElementById('sidebarLibrary');
                if (projects.length) {
                    container.innerHTML = projects.map(p => `
                        <div onclick="loadProjectHistory('${p.id}', '${p.title}')" class="flex flex-col gap-1 px-4 py-4 bg-white border border-slate-100 rounded-2xl cursor-pointer hover:border-blue-500 transition-all text-left mb-2 shadow-sm">
                            <span class="text-[8px] font-black text-blue-600 uppercase bg-blue-50 px-2 py-0.5 rounded-full w-max italic">Archive</span>
                            <p class="text-xs font-bold truncate text-slate-700">${p.title}</p>
                        </div>
                    `).join('');
                }
            } catch (e) { console.log("DB offline"); }
        }

        async function loadProjectHistory(id, title) {
            currentProjectId = id;
            document.getElementById('movieTitle').innerText = title;
            const history = document.getElementById('chatHistory');
            history.innerHTML = '<p class="text-xs p-10 opacity-50 italic text-center">Syncing history...</p>';
            if(window.innerWidth < 1024) toggleSidebar();
            try {
                const res = await fetch(`/api/chats/${id}`);
                const chats = await res.json();
                history.innerHTML = '';
                chats.forEach(c => {
                    const bubble = document.createElement('div');
                    bubble.className = c.role === 'user' ? "flex justify-end mb-4" : "p-7 bg-white border border-slate-200 rounded-[28px] flex gap-5 shadow-sm mb-4";
                    bubble.innerHTML = c.role === 'user' ? `<div class="bg-slate-900 text-white p-4 rounded-[20px] text-sm max-w-[85%] font-medium text-left">${c.content}</div>` : `<div class="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center text-[10px] font-bold text-blue-600 shrink-0 italic">⚡</div><div class="space-y-1"><p class="text-[10px] font-bold uppercase tracking-widest text-blue-600 italic">Lead Producer</p><p class="text-sm opacity-80 leading-relaxed font-medium">${c.content.replace(/\n/g, '<br>')}</p></div>`;
                    history.appendChild(bubble);
                });
                document.getElementById('workspace').scrollTop = document.getElementById('workspace').scrollHeight;
            } catch (e) { console.log(e); }
        }

        async function handleSend() {
            const input = document.getElementById('userInput').value.trim();
            if(!input) return;
            const sendBtn = document.getElementById('sendBtn');
            const history = document.getElementById('chatHistory');
            const workspace = document.getElementById('workspace');

            const userMsg = document.createElement('div');
            userMsg.className = "flex justify-end mb-4";
            userMsg.innerHTML = `<div class="bg-slate-900 text-white p-4 rounded-[18px] text-sm max-w-[85%] shadow-md font-medium text-left">${input}</div>`;
            history.appendChild(userMsg);

            document.getElementById('userInput').value = '';
            document.getElementById('userInput').style.height = 'auto';
            sendBtn.disabled = true;

            const thinking = document.createElement('div');
            thinking.className = "p-4 bg-white/50 border border-slate-100 rounded-2xl flex gap-3 shadow-sm mb-4";
            thinking.innerHTML = `<div class="w-6 h-6 rounded bg-blue-500/10 flex items-center justify-center text-blue-600 text-[8px] italic shrink-0">⚡</div><span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest italic animate-pulse">Thinking...</span>`;
            history.appendChild(thinking);
            workspace.scrollTop = workspace.scrollHeight;

            try {
                const response = await fetch('/api/chat', { method: 'POST', body: new URLSearchParams({'message': input, 'project_id': currentProjectId || ''}) });
                const data = await response.json();
                currentProjectId = data.project_id;
                
                thinking.className = "p-7 bg-white border border-slate-200 rounded-[28px] flex gap-5 shadow-sm mb-4";
                thinking.innerHTML = `<div class="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center text-[10px] font-bold text-blue-600 shrink-0 italic">⚡</div><div class="space-y-1"><p class="text-[10px] font-bold uppercase tracking-widest text-blue-600 italic">Lead Producer</p><p class="text-sm opacity-80 leading-relaxed font-medium">${data.reply.replace(/\n/g, '<br>')}</p></div>`;
                loadSidebar();
            } catch (e) { thinking.innerHTML = `<p class="text-xs text-red-500 p-2 italic text-left">Architecture Offline.</p>`; }
            finally { sendBtn.disabled = false; workspace.scrollTop = workspace.scrollHeight; }
        }

        function startVideo() {
            const v = document.getElementById('videoPlayer');
            v.src = "https://www.w3schools.com/html/mov_bbb.mp4";
            document.getElementById('poster').classList.add('hidden');
            document.getElementById('playBtn').classList.add('hidden');
            v.classList.remove('hidden');
            v.play();
        }

        window.onload = () => { loadSidebar(); };
    </script>
</body>
</html>
