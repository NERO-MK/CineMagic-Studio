<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Lead Producer Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="antialiased font-sans transition-colors duration-300">

    <!-- Note *: Soft Backdrop - Lower opacity to avoid blinding light -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[90] hidden"></div>

    <div class="main-wrapper">
        
        <!-- Note *: Fixed Light Sidebar -->
        <aside id="sidebar" class="sidebar-closed bg-white border-r border-zinc-200 flex flex-col h-full z-[100] overflow-hidden fixed lg:static inset-y-0 left-0 shadow-2xl">
            <!-- Top Section -->
            <div class="p-6 flex-1 overflow-y-auto custom-scroll flex flex-col">
                <button onclick="location.reload()" class="w-full py-3 bg-zinc-900 text-white font-bold text-[10px] rounded-lg mb-8 uppercase tracking-widest shadow-md hover:opacity-90 transition-all">+ New Project</button>
                
                <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-4 px-2 italic underline text-left">Archives</p>
                <div id="sidebarLibrary" class="space-y-1">
                    <!-- Note *: Archive categories will appear here -->
                    <p class="text-[10px] text-zinc-400 p-2 italic text-left">Syncing database...</p>
                </div>
            </div>

            <!-- Note *: Bottom Section - Pinned to Bottom -->
            <div class="mt-auto border-t border-zinc-100 bg-zinc-50/50 space-y-4 pb-4">
                <!-- Usage Monitor -->
                <div class="p-6 pb-2 space-y-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black uppercase text-zinc-500"><span>Daily Limit</span><span class="text-blue-500">3/5</span></div>
                        <div class="hud-bar"><div class="hud-fill" style="width: 60%;"></div></div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black uppercase text-zinc-500"><span>Tokens</span><span class="text-blue-500">1.2K/5K</span></div>
                        <div class="hud-bar"><div class="hud-fill" style="width: 25%;"></div></div>
                    </div>
                </div>

                <!-- Account & Settings (Strictly Bottom) -->
                <div class="px-6 flex items-center justify-between gap-3">
                    <div onclick="toggleSettings()" class="flex items-center gap-3 cursor-pointer group overflow-hidden">
                        <div class="w-9 h-9 rounded-lg bg-zinc-900 flex items-center justify-center font-bold text-white shadow-sm text-xs italic shrink-0">A</div>
                        <div class="overflow-hidden text-left">
                            <p class="text-[10px] font-black uppercase truncate text-zinc-800">Alex Thorne</p>
                            <p class="text-[8px] font-bold text-blue-500 uppercase tracking-widest italic">Lead Producer</p>
                        </div>
                    </div>
                    <button onclick="toggleSettings()" class="text-zinc-400 hover:text-blue-500 transition-colors"><i class="fa-solid fa-gear text-sm"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="viewport">
            <header class="h-14 flex items-center justify-between px-6 border-b border-zinc-100 dark:border-zinc-800 shrink-0 bg-white/80 dark:bg-obsidian/80 backdrop-blur-md z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="text-zinc-500 p-1 hover:text-blue-500 transition-colors"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
                    <div class="flex items-center gap-2">
                        <span class="text-xl">⚡</span>
                        <span class="text-xs font-black italic tracking-tighter uppercase text-zinc-800 dark:text-white">CineMagic <span class="text-zinc-400 dark:text-zinc-500 font-normal">/ AI Studio</span></span>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:text-blue-500 transition-colors shadow-sm">
                    <i id="theme-icon" class="fa-solid fa-moon text-xs"></i>
                </button>
            </header>

            <!-- Monitor Area -->
            <div class="monitor-fixed p-4 md:p-6 shadow-sm">
                <div class="player-frame">
                    <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                    <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                    <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                        <div class="w-14 h-14 rounded-full bg-black/50 border border-white/20 text-white flex items-center justify-center text-xl backdrop-blur-md hover:scale-110 shadow-2xl transition-transform">
                            <i class="fa-solid fa-play ml-1"></i>
                        </div>
                    </div>
                </div>
                <div class="max-w-[500px] mx-auto mt-4 flex justify-between items-center gap-4 px-1 text-left">
                    <h1 id="movieTitle" class="text-xs font-bold truncate opacity-80 uppercase text-zinc-600 dark:text-zinc-400">Studio Monitor</h1>
                    <div class="flex gap-2">
                        <button class="native-btn"><i class="fa-solid fa-download"></i></button>
                        <button class="native-btn"><i class="fa-solid fa-share-nodes"></i></button>
                        <button class="native-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div id="workspace" class="chat-scroll p-4 md:p-10 flex flex-col items-center">
                <div id="chatHistory" class="w-full max-w-2xl space-y-6 pb-48 text-left">
                    <div class="p-7 bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 rounded-[28px] flex gap-5 shadow-sm">
                        <div class="w-10 h-10 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 shrink-0 italic border border-zinc-200 dark:border-zinc-800 shadow-inner">⚡</div>
                        <p class="text-sm opacity-80 leading-relaxed font-medium text-zinc-800 dark:text-zinc-100">Welcome Alex. Production studio is active. Speak your vision.</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="shrink-0 p-4 md:p-6 bg-gradient-to-t from-white dark:from-obsidian via-transparent to-transparent z-30">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white dark:bg-zinc-900 rounded-[24px] p-1.5 flex items-end border border-zinc-200 dark:border-zinc-800 focus-within:border-blue-500 shadow-xl transition-all">
                        <button onclick="alert('Upload module active')" class="w-11 h-11 flex items-center justify-center text-zinc-400 hover:text-blue-500 transition-colors"><i class="fa-solid fa-circle-plus text-lg"></i></button>
                        <textarea id="userInput" rows="1" placeholder="Ask CineMagic..." class="flex-1 bg-transparent border-none outline-none text-sm p-3 resize-none max-h-40 font-medium text-zinc-800 dark:text-zinc-100"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl flex items-center justify-center hover:opacity-90 active:scale-95 transition-all m-1">
                            <i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
