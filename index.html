<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMagic | Elite Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb', slateBg: '#f8fafc' } } } }</script>
</head>
<body class="antialiased bg-slateBg text-slate-900">

    <!-- Note *: Mobile Sidebar Backdrop -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden lg:hidden"></div>

    <div class="main-wrapper">
        
        <!-- Note *: Sidebar with Independent Scroll -->
        <aside id="sidebar" class="sidebar-closed bg-white border-r border-slate-200 flex flex-col h-full z-[100] fixed lg:static inset-y-0 left-0 shadow-2xl lg:shadow-none overflow-hidden transition-all">
            <div class="p-8 flex-1 overflow-y-auto custom-scroll flex flex-col text-left">
                <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white font-bold text-xs rounded-2xl mb-12 uppercase tracking-widest shadow-lg active:scale-95 transition-all">+ New Production</button>
                <nav class="space-y-10">
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-5 px-2 underline italic">Archives</p>
                        <div id="sidebarLibrary" class="space-y-2"></div>
                    </div>
                </nav>
            </div>
            <div class="mt-auto border-t border-slate-100 p-8 space-y-6 bg-slate-50/50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-white shadow-md italic">A</div>
                    <div class="text-left overflow-hidden"><p class="text-xs font-bold truncate text-slate-800">Alex Thorne</p></div>
                </div>
                <i class="fa-solid fa-gear text-slate-300 text-sm cursor-pointer hover:text-primary"></i>
            </div>
        </aside>

        <!-- Main Viewport -->
        <main class="viewport">
            <header class="h-16 flex items-center justify-between px-8 border-b border-slate-200 shrink-0 bg-white/80 backdrop-blur-xl z-30">
                <div class="flex items-center gap-6">
                    <!-- Note *: Hamburger Menu Fixed -->
                    <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:text-primary transition-all">
                        <i class="fa-solid fa-bars-staggered text-lg"></i>
                    </button>
                    <div class="flex items-center gap-2">
                        <span class="text-2xl text-slate-800">⚡</span>
                        <span class="text-sm font-black uppercase tracking-tighter">CineMagic <span class="text-slate-400 font-normal">/ Studio</span></span>
                    </div>
                </div>

                <!-- Note *: New Header HUD (Model & Tokens) -->
                <div class="flex flex-col text-right">
                    <div class="flex items-center gap-2 justify-end mb-1">
                        <p class="text-[8px] font-black uppercase text-slate-400 tracking-widest leading-none">Model:</p>
                        <span id="activeModel" class="text-[10px] font-bold text-blue-600 italic">Gemini 1.5 Flash</span>
                    </div>
                    <div class="flex items-center gap-2 justify-end">
                        <p class="text-[8px] font-black uppercase text-slate-400 tracking-widest leading-none">Tokens:</p>
                        <span id="tokenUsage" class="text-[10px] font-bold text-slate-800 tracking-tight">24,783</span>
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                    </div>
                </div>
            </header>

            <div class="monitor-area p-4 md:p-6 shrink-0 border-b border-slate-100 bg-white">
                <div class="player-wrapper max-w-4xl mx-auto flex flex-col gap-6">
                    <div class="player-frame relative group">
                        <img id="poster" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60">
                        <video id="videoPlayer" class="hidden w-full h-full" controls></video>
                        <div id="playBtn" onclick="startVideo()" class="video-play-btn cursor-pointer z-20">
                            <div class="w-14 h-14 rounded-full bg-primary/80 text-white flex items-center justify-center text-xl backdrop-blur-md shadow-2xl transition-transform hover:scale-110"><i class="fa-solid fa-play ml-1"></i></div>
                        </div>
                    </div>
                    <!-- Pro Action Bar -->
                    <div class="max-w-[550px] mx-auto w-full flex justify-between items-center px-1">
                        <h1 id="movieTitle" class="text-xs font-bold uppercase opacity-60 italic">Monitor Active</h1>
                        <div class="flex gap-2">
                            <button class="native-btn" title="Download"><i class="fa-solid fa-download"></i></button>
                            <button class="native-btn" title="Social Sync"><i class="fa-solid fa-share-nodes"></i></button>
                            <button class="native-btn" title="Cloud Post"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Area: Fixed Flex-Grow for correct bottom placement -->
            <div id="workspace" class="chat-scroll flex-1 p-4 md:p-10 flex flex-col items-center">
                <div id="chatHistory" class="max-w-2xl w-full space-y-10 pb-48 text-left text-slate-700 font-medium">
                    <div class="flex gap-6 items-start">
                        <div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center text-primary text-xs shrink-0 border border-primary/20">⚡</div>
                        <p class="text-sm leading-relaxed font-medium italic">Hello Alex. Lead Producer online. I have architected the studio based on your vision. Speak to start.</p>
                    </div>
                </div>
            </div>

            <!-- Note *: Pill Input Area (Keyboard Fix) -->
            <div class="shrink-0 p-4 md:p-10 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent z-40">
                <div class="max-w-3xl mx-auto">
                    <div class="input-container-pill bg-white border border-slate-200 p-1.5 flex items-end shadow-2xl focus-within:border-primary/50 transition-all">
                        <button onclick="document.getElementById('voiceUpload').click()" class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-primary shrink-0 mb-0.5"><i class="fa-solid fa-circle-plus text-xl"></i></button>
                        <input type="file" id="voiceUpload" class="hidden">
                        <textarea id="userInput" rows="1" placeholder="Describe vision or paste link..." 
                                  class="flex-1 bg-transparent border-none outline-none text-[15px] p-3 resize-none overflow-y-auto max-h-[120px] font-medium text-slate-800 leading-relaxed custom-scroll" oninput="autoGrow(this)"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="w-11 h-11 bg-slate-900 text-white rounded-full flex items-center justify-center m-1 shrink-0 shadow-lg active:scale-95 transition-all"><i id="sendIcon" class="fa-solid fa-arrow-up text-lg"></i></button>
                    </div>
                    <p class="text-[8px] text-center mt-4 text-slate-400 font-bold uppercase tracking-[0.4em]">Media Architecture Core 10.0</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
